name: Deploy Admin UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Debug info
        run: |
          node --version
          pnpm --version
          which node
          ls -la /home/runner/work/line-crm/line-crm

      - name: 依存関係インストール
        run: pnpm install --frozen-lockfile

      - name: shared パッケージビルド
        run: pnpm --filter @line-crm/shared build

      - name: 管理画面ビルド
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: 'https://oryzae-line-crm.oryzae.workers.dev'
          NEXT_PUBLIC_LIFF_ID: ${{ secrets.NEXT_PUBLIC_LIFF_ID }}
          GITHUB_PAGES: 'true'
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          pnpm build 2>&1 | tee /tmp/build-log.txt || true
          echo "=== BUILD LOG ==="
          cat /tmp/build-log.txt
          echo "=== END BUILD LOG ==="

      - run: |
          if grep -i 'error' /tmp/build-log.txt; then
            echo "FOUND ERRORS:"
            grep -i 'error' /tmp/build-log.txt
            exit 1
          fi
          if ! [ -d apps/web/out ]; then
            echo "BUILD FAILED - no output directory"
            exit 1
          fi

      - name: GitHub Pages 設定
        run: |
          touch apps/web/out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
