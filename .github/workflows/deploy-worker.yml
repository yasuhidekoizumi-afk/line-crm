name: Deploy Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/worker/**'
      - 'packages/db/**'
      - 'packages/shared/**'
      - 'packages/line-sdk/**'
      - '.github/workflows/deploy-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Debug info
        run: |
          node --version
          pnpm --version
          which node

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @line-crm/shared --filter @line-crm/line-sdk --filter @line-crm/db build

      - name: Worker build with log capture
        run: |
          pnpm --filter worker build 2>&1 | tee /tmp/worker-build-log.txt
        env:
          VITE_LIFF_ID: ${{ vars.VITE_LIFF_ID }}
          VITE_BOT_BASIC_ID: ${{ vars.VITE_BOT_BASIC_ID }}
          VITE_CALENDAR_CONNECTION_ID: ${{ vars.VITE_CALENDAR_CONNECTION_ID }}

      - run: |
          echo "=== BUILD LOG ==="
          cat /tmp/worker-build-log.txt
          echo "=== END BUILD LOG ==="
          if grep -i 'error' /tmp/worker-build-log.txt; then
            echo "FOUND ERRORS:"
            grep -i 'error' /tmp/worker-build-log.txt
            exit 1
          fi

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: deploy
