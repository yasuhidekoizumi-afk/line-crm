name = "oryzae-line-crm"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true
account_id = "6e03cc31dd3bb7aaf902ad5d610ed0d4"

# Static assets (LIFF pages) served by Workers Assets
# SPA fallback ensures all non-API paths serve index.html
[assets]
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "oryzae-line-crm"
database_id = "e47571b1-cd3f-4791-9040-2c2e55034ed8"

# R2 は後で有効化（クレジットカード登録後）
# [[r2_buckets]]
# binding = "IMAGES"
# bucket_name = "oryzae-line-crm-images"

[triggers]
# 5分毎: LINE ステップ配信・ブロードキャスト + FERMENT キャンペーン/フロー処理
# 1時間毎: FERMENT セグメント再計算
# 毎日 0:00 UTC (9:00 JST): FERMENT 日次サマリー
crons = ["*/5 * * * *", "0 * * * *", "0 0 * * *"]

[vars]
SHOPIFY_SHOP_DOMAIN = "yasuhide-koizumi.myshopify.com"
# SHOPIFY_ADMIN_TOKEN は wrangler secret put SHOPIFY_ADMIN_TOKEN で設定すること

# FERMENT: 送信元アドレス設定（秘匿不要）
FERMENT_FROM_EMAIL_JP = "hello@oryzae.site"
FERMENT_FROM_EMAIL_US = "hello@oryzae.site"
FERMENT_FROM_NAME_JP = "オリゼ"
FERMENT_FROM_NAME_US = "ORYZAE"
FERMENT_UNSUBSCRIBE_BASE_URL = "https://oryzae-line-crm.oryzae.workers.dev/email/unsubscribe"

# FERMENT シークレット（要 wrangler secret put コマンドで設定）
# wrangler secret put RESEND_API_KEY
# wrangler secret put RESEND_WEBHOOK_SECRET
# wrangler secret put ANTHROPIC_API_KEY
# wrangler secret put GEMINI_API_KEY
# wrangler secret put SLACK_WEBHOOK_URL
# wrangler secret put FERMENT_SHOPIFY_WEBHOOK_SECRET
# wrangler secret put FERMENT_HMAC_SECRET
